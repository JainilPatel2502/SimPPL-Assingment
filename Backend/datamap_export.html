  <style>
    .content-wrapper {
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      padding: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      min-height: calc(100vh - 16px);
      pointer-events: none
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: 0;
      pointer-events: none;
      max-height: 50vh;
      overflow-y: visible
    }

    .top-left {
      grid-column: 1;
      grid-row: 1;
      justify-self: start;
      align-self: start;
      align-items: start
    }

    .bottom-left {
      grid-column: 1;
      grid-row: 2;
      justify-self: start;
      align-self: end;
      align-items: start;
      display: flex;
      flex-direction: column-reverse;
      transform: scaleY(-1);
      z-index: 2
    }

    .top-right {
      grid-column: 2;
      grid-row: 1;
      justify-self: end;
      justify-items: end;
      align-self: start;
      align-items: end
    }

    .bottom-right {
      grid-column: 2;
      grid-row: 2;
      justify-self: end;
      justify-items: end;
      align-self: end;
      align-items: end;
      display: flex;
      flex-direction: column-reverse;
      transform: scaleY(-1)
    }

    .stack.bottom-left .stack-box {
      transform: scaleY(-1)
    }

    .stack.bottom-right .stack-box {
      transform: scaleY(-1)
    }

    #loading {
      width: 100%;
      height: 100%;
      top: 0px;
      left: 0px;
      position: absolute;
      display: block;
      z-index: 99
    }

    #loading-image {
      position: absolute;
      top: 45%;
      left: 47.5%;
      z-index: 100
    }

    #title-container {
      top: 0;
      left: 0
    }

    @media screen and (max-width:1200px) {
      .content-wrapper {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr
      }

      .top-left {
        grid-column: 1;
        grid-row: 1
      }

      .top-right {
        grid-column: 1;
        grid-row: 1;
        justify-self: end
      }

      .bottom-left {
        grid-column: 1;
        grid-row: 2
      }

      .bottom-right {
        grid-column: 1;
        grid-row: 2;
        justify-self: end
      }

      .stack {
        max-height: 40vh
      }
    }

    @media screen and (max-width:768px) {
      .content-wrapper {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr
      }

      .top-right,
      .bottom-left,
      .bottom-right {
        display: none
      }

      .top-left {
        max-height: 30vh;
        overflow-y: auto
      }

      .container-box {
        margin: 4px 8px;
        padding: 8px;
        font-size: 0.9em
      }
    }

    @media screen and (max-width:480px) {
      .container-box {
        margin: 2px 4px;
        padding: 6px;
        font-size: 0.85em;
        border-radius: 12px
      }

      .stack {
        max-height: 25vh
      }
    }
  </style>
  <style>
    .datamapplot-progress-container {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translate(-50%, 0);
      width: 512px;
      z-index: 101
    }

    .datamapplot-progress-bar {
      width: 100%;
      background-color: #e0e0e044;
      padding: 3px;
      border-radius: 6px;
      box-shadow: inset 0 1px 3px rgba(128, 128, 128, .2);
      margin-bottom: 10px
    }

    .datamapplot-progress-bar-fill {
      display: block;
      height: 12px;
      background-color: #659cef;
      border-radius: 4px;
      transition: width 500ms ease-in-out
    }

    .datamapplot-progress-bar-text {
      color: white;
      text-align: center;
      line-height: 12px;
      font-size: 10px;
      overflow-x: visible;
      white-space: nowrap;
      vertical-align: top
    }
  </style>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #ffffff;
      font-family: Roboto;
      color: #000000;
    }

    .container-box {
      margin: 8px 16px 8px 16px;
      padding: 12px;
      border-radius: 16px;
      line-height: 0.95;
      width: fit-content;
      height: fit-content;
      z-index: 2;
      backdrop-filter: blur(3px);
      background: #ffffffaa;
      box-shadow: 2px 3px 10px #aaaaaa44;
      position: relative;
      pointer-events: auto;
    }

    .more-opaque {
      backdrop-filter: blur(6px);
      background-color: #ffffffee;
    }

    #deck-container {
      width: 100vw;
      height: 100vh;
    }

    #deck-container canvas {
      z-index: 1;
      background: #ffffff;
    }

    .deck-tooltip {

      font-size: 0.8em;
      font-family: Roboto;
      font-weight: 300;
      color: #000000 !important;
      background-color: #ffffffee !important;
      border-radius: 12px;
      backdrop-filter: blur(6px);
      box-shadow: 2px 3px 10px #aaaaaa44;
      max-width: 25%;
    }

    input {
      margin: 2px;
      padding: 4px;
      border-radius: 8px;
      color: #000000;
      background: #ffffffdd;
      border: 2px inset #77777744;
      transition: 0.5s;
      outline: none;
      box-sizing: border-box;
    }

    input:focus {
      border: 2px inset #555;
    }

    #search-container {
      width: fit-content;
    }
  </style>

  self.onmessage = async function(event) {
  const { encodedData, JSONParse } = event.data;
    // Function to parse base64 to Uint8Array
    async function DecompressBytes(bytes) {
      const blob = new Blob([bytes]);
      const decompressedStream = blob.stream().pipeThrough(
        new DecompressionStream("gzip")
      );
      const arr = await new Response(decompressedStream).arrayBuffer()
      return new Uint8Array(arr);
    }
    async function decodeBase64WithProgress(base64) {
      const totalLength = base64.length;
      const chunkSize = 1024 * 1024; // 1MB chunks
      let decodedArray = new Uint8Array(Math.ceil(totalLength * 3 / 4));
      let offset = 0;

      for (let i = 0; i < totalLength; i += chunkSize) {
        const chunk = base64.slice(i, i + chunkSize);
        const decodedChunk = Uint8Array.from(atob(chunk), c => c.charCodeAt(0));
        decodedArray.set(decodedChunk, offset);
        offset += decodedChunk.length;

        const progress = Math.min(100, Math.round((i + chunkSize) / totalLength * 100));
        self.postMessage({ type: 'progress', progress: progress });

        // Allow other operations to occur
        await new Promise(resolve => setTimeout(resolve, 0));
      }

      return decodedArray.slice(0, offset);
    }
    const decodedData = await decodeBase64WithProgress(encodedData);
    const decompressedData = await DecompressBytes(decodedData);
    if (JSONParse) {
      const parsedData = JSON.parse(new TextDecoder("utf-8").decode(decompressedData));
      self.postMessage({ type: "data", data: parsedData });
    } else {
      self.postMessage({ type: "data", data: decompressedData });
    }
  }

  // =============================================================================
  // Density Tile Image Resolver
  // =============================================================================

  async function resolveDensityTileImages(tilePyramids) {
    // When running inside a Jupyter notebook with file-based data, image URLs
    // point at the Jupyter contents API which returns JSON with base64 content
    // instead of raw image bytes.  Detect this and convert to blob URLs so that
    // deck.gl BitmapLayer can consume them.
    const allTiles = [];
    for (const field of Object.keys(tilePyramids)) {
      for (const level of tilePyramids[field]) {
        for (const tile of level) {
          allTiles.push(tile);
        }
      }
    }
    if (allTiles.length === 0) return;

    // Only need special handling when the URL routes through /api/contents/
    const needsResolve = allTiles[0].image.includes('/api/contents/');
    if (!needsResolve) return;

    const headers = {};
    const densityApiToken = (typeof DENSITY_API_TOKEN !== 'undefined') ? DENSITY_API_TOKEN : null;
    if (densityApiToken) {
      headers['Authorization'] = 'Token ' + densityApiToken;
    }

    await Promise.all(allTiles.map(async (tile) => {
      try {
        const resp = await fetch(tile.image, { headers });
        if (!resp.ok) {
          console.error('Failed to fetch density tile:', tile.image, resp.status);
          return;
        }
        const json = await resp.json();
        const b64 = json.content;  // Jupyter contents API base64 field
        const bin = atob(b64);
        const bytes = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        const blob = new Blob([bytes], { type: 'image/png' });
        tile.image = URL.createObjectURL(blob);
      } catch (e) {
        console.error('Error resolving density tile image:', e);
      }
    }));
  }

        const pointData = parsedData;

        datamap.addPoints(pointData, {
          pointSize: 0.11765929011495634,
          pointOutlineColor: [250, 250, 250, 128],
          pointLineWidth: 0.001,
          pointHoverColor: [170, 0, 0, 187],
          pointLineWidthMaxPixels: 3,
          pointLineWidthMinPixels: 0.001,
          pointRadiusMaxPixels: 24,
          pointRadiusMinPixels: 0.01,
        });





        document.getElementById("loading").style.display = "none";
        updateProgressBar('point-data-progress', 100);
        checkAllDataLoaded();


      }
    };




  }





  // =============================================================================
  // Label Data Loading
  // =============================================================================

  function loadLabelDataLayer() {
    const labelDataWorker = new Worker(workerUrl);
    labelDataWorker.postMessage({ encodedData: labelDataEncoded, JSONParse: true });

    labelDataWorker.onmessage = async function (event) {
      if (event.data.type === "progress") {
        updateProgressBar('label-data-progress', event.data.progress);
      } else {
        const { data } = event.data;


        const parsedData = data;


        const labelData = parsedData;

        datamap.labelData = labelData;

        datamap.addLabels(

          labelData
          ,
          {
            labelTextColor: d => [d.r, d.g, d.b],
            textMinPixelSize: 18,
            textMaxPixelSize: 36,
            textOutlineWidth: 8,
            textOutlineColor: [238, 238, 238, 221],
            textBackgroundColor: [255, 255, 255, 64],
            fontFamily: "Roboto",
            fontWeight: 600,
            lineSpacing: 0.95,
            textCollisionSizeScale: 3,
            noiseLabel: "Unlabelled",
            pickable: false,
          }
        );





        // Dispatch event for widget initialization
        document.dispatchEvent(new CustomEvent('datamapLabelsLoaded', { detail: { labelData } }));

        document.getElementById("loading").style.display = "none";
        updateProgressBar('label-data-progress', 100);
        checkAllDataLoaded();
      }
    };
  }



  // =============================================================================
  // Meta Data Loading
  // =============================================================================

  function loadMetaData() {
    const metaDataWorker = new Worker(workerUrl);
    metaDataWorker.postMessage({ encodedData: hoverDataEncoded, JSONParse: true });

    metaDataWorker.onmessage = async function (event) {
      if (event.data.type === "progress") {
        updateProgressBar('meta-data-progress', event.data.progress);
      } else {
        const { data } = event.data;


        const parsedData = data;


        const hoverData = parsedData;

        datamap.addMetaData(hoverData, {
          tooltipFunction: ({ index }) => hoverData.hover_text[index],
          onClickFunction: null,
          searchField: "hover_text",
        });

        const searchItem = document.getElementById(searchItemId);
        if (searchItem) {
          searchItem.addEventListener("input", debounce(event => datamap.searchText(event.target.value)));
        }

        updateProgressBar('meta-data-progress', 100);
        checkAllDataLoaded();
      }
    };
  }



  // =========================================================================
  // Initialization
  // =========================================================================

  loadPointDataLayer();
  loadLabelDataLayer();
  loadMetaData();


</script>

</html>
